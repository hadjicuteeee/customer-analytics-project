version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    env_file:
      - .env.docker

  etl:
    build: .
    container_name: customer_etl
    restart: "no"

    depends_on:
      - postgres

    env_file:
      - .env.docker

    volumes:
      - .:/app

    command: python main.py

volumes:
  postgres_data:
